<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>탐험 맵 에디터</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #ccc; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 12px; padding: 10px 16px;
      background: #111; border-bottom: 1px solid #333; flex-wrap: wrap;
    }
    #toolbar h1 { font-size: 14px; color: #fff; margin-right: 8px; }

    .palette-tabs { display: flex; gap: 0; margin-right: 8px; }
    .palette-tab {
      padding: 4px 12px; border: 1px solid #444; background: #1a1a1a;
      color: #888; cursor: pointer; font-size: 12px; font-family: monospace;
    }
    .palette-tab:first-child { border-radius: 4px 0 0 4px; }
    .palette-tab:last-child { border-radius: 0 4px 4px 0; }
    .palette-tab.active { background: #2a2a2a; color: #fff; border-color: #666; }

    #dungeon-palette { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .palette-divider { width: 1px; height: 28px; background: #444; flex-shrink: 0; }
    .dungeon-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border: 2px solid #444; border-radius: 4px;
      background: #222; color: #ccc; cursor: pointer; font-size: 13px; font-family: monospace;
    }
    .dungeon-btn.active { border-color: #f90; color: #f90; }
    .dungeon-btn.paint-active { border-color: #4af; color: #4af; }

    .biome-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border: 2px solid #444; border-radius: 4px;
      background: #222; color: #ccc; cursor: pointer; font-size: 13px; font-family: monospace;
    }
    .biome-btn.active { border-color: #fff; color: #fff; }
    .biome-swatch { width: 14px; height: 14px; border-radius: 2px; border: 1px solid #555; flex-shrink: 0; }

    /* Dungeon panel */
    #dungeon-panel {
      padding: 12px; background: #111; border-bottom: 1px solid #333;
      display: none; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto;
    }
    #dungeon-panel.visible { display: flex; }
    .dungeon-list { display: flex; flex-direction: column; gap: 6px; }
    .dungeon-list-item {
      display: flex; flex-direction: column; align-items: stretch; padding: 6px 8px;
      background: #1a1a1a; border: 1px solid #333; border-radius: 4px; font-size: 12px;
    }
    .dungeon-item-header { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .dungeon-item-header span { flex: 1; color: #ccc; }
    .dungeon-item-form { display: none; margin-top: 8px; }
    .dungeon-item-form.open { display: block; }
    .dungeon-list-item button { padding: 2px 8px; font-size: 11px; font-family: monospace; border-radius: 3px; cursor: pointer; }
    .dungeon-list-item .btn-paint { background: #1a2a3a; border: 1px solid #3a6a9a; color: #7ab; }
    .dungeon-list-item .btn-paint.active { background: #1a3a5a; border-color: #4af; color: #4af; }
    .dungeon-list-item .btn-edit { background: #2a2a1a; border: 1px solid #6a6a2a; color: #aa9; }
    .dungeon-list-item .btn-delete { background: #3a1a1a; border: 1px solid #7a3a3a; color: #c88; }

    #dungeon-form-wrap { border: 1px solid #444; border-radius: 4px; padding: 10px; background: #1a1a1a; }
    #dungeon-form-wrap h3 { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .form-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; flex-wrap: wrap; }
    .form-row label { font-size: 11px; color: #888; display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 80px; }
    .form-row input, .form-row textarea, .form-row select {
      background: #222; border: 1px solid #444; color: #ccc; padding: 4px 6px;
      border-radius: 3px; font-family: monospace; font-size: 12px; width: 100%;
    }
    .form-row textarea { resize: none; overflow-y: hidden; min-height: 40px; }
    .floor-block { border: 1px solid #333; border-radius: 3px; padding: 8px; margin-bottom: 6px; background: #131313; }
    .floor-block h4 { font-size: 11px; color: #777; margin-bottom: 6px; }
    .form-actions { display: flex; gap: 8px; margin-top: 8px; }

    #toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    button.action-btn {
      padding: 5px 12px; background: #2a3a2a; border: 1px solid #4a7a4a;
      border-radius: 4px; color: #8fcf8f; cursor: pointer; font-size: 12px; font-family: monospace;
    }
    button.action-btn:hover { background: #354535; }
    button.action-btn.danger { background: #3a2a2a; border-color: #7a4a4a; color: #cf8f8f; }
    button.action-btn.danger:hover { background: #453535; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #canvas-wrap {
      flex: 1; overflow: auto; display: flex; align-items: flex-start;
      justify-content: flex-start; padding: 16px;
    }

    #map-canvas { cursor: crosshair; image-rendering: pixelated; }

    #sidebar {
      width: 220px; background: #111; border-left: 1px solid #333;
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto;
    }
    #sidebar h2 { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    #info-box { font-size: 12px; line-height: 1.7; color: #999; }
    #info-box strong { color: #ddd; }
    #start-controls { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
    #start-controls label { color: #999; }
    #start-controls input { width: 100%; background: #222; border: 1px solid #444; color: #ccc; padding: 4px 6px; border-radius: 3px; font-family: monospace; }

    #legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .legend-swatch { width: 16px; height: 16px; border-radius: 2px; border: 1px solid #555; flex-shrink: 0; }

    #status-bar {
      padding: 4px 12px; background: #0d0d0d; border-top: 1px solid #2a2a2a;
      font-size: 11px; color: #666;
    }

    #zoom-controls { display: flex; gap: 6px; align-items: center; font-size: 12px; }
    #zoom-controls button { padding: 2px 8px; background: #2a2a2a; border: 1px solid #444; color: #ccc; cursor: pointer; border-radius: 3px; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>🗺️ 맵 에디터</h1>
  <div class="palette-tabs">
    <button class="palette-tab active" id="tab-biome" onclick="switchPaletteTab('biome')">바이옴</button>
    <button class="palette-tab" id="tab-dungeon" onclick="switchPaletteTab('dungeon')">던전 프리셋</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <div id="biome-palette"></div>
    <div class="palette-divider"></div>
    <div id="dungeon-palette"></div>
  </div>
  <div id="toolbar-right">
    <div id="zoom-controls">
      <button onclick="setZoom(zoom - 2)">−</button>
      <span id="zoom-label">16px</span>
      <button onclick="setZoom(zoom + 2)">+</button>
    </div>
    <button class="action-btn" onclick="loadFile()">📂 JSON 불러오기</button>
    <button class="action-btn" onclick="showTokenDialog()" id="gh-token-btn" title="GitHub Token 설정">🔑</button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="onFileSelected(event)">
  </div>
</div>
<div id="dungeon-panel"></div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="map-canvas"></canvas>
  </div>

  <div id="sidebar">
    <div>
      <h2>정보</h2>
      <div id="info-box">커서를 맵에 올려보세요.</div>
    </div>
    <div>
      <h2>출발 지점</h2>
      <div id="start-controls">
        <label>X: <input type="number" id="start-x" min="0" oninput="onStartChange()"></label>
        <label>Y: <input type="number" id="start-y" min="0" oninput="onStartChange()"></label>
        <button class="action-btn" onclick="setStartFromCursor()" style="margin-top:2px">현재 커서 위치로 설정</button>
      </div>
    </div>
    <div>
      <h2>바이옴 범례</h2>
      <div id="legend"></div>
    </div>
    <div>
      <h2>도움말</h2>
      <div style="font-size:11px; color:#666; line-height:1.6">
        좌클릭/드래그: 페인트<br>
        우클릭: 바이옴 선택<br>
        Ctrl+Z: 실행 취소<br>
        휠: 확대/축소
      </div>
    </div>
  </div>
</div>

<div id="status-bar" id="status">준비</div>

<script>
// ── 바이옴 정의 ─────────────────────────────────────────────────────────────
const BIOMES = [
  { id: 'boneyard',    name: '백골 분지',    emoji: '⬜', color: '#d4d0c4' },
  { id: 'sanctuary',  name: '안식지',        emoji: '🟫', color: '#8B6914' },
  { id: 'scrapfield', name: '고철지대',      emoji: '🪨', color: '#666060' },
  { id: 'glasswastes',name: '유리 황무지',   emoji: '🟦', color: '#3a6898' },
]
const BIOME_MAP = Object.fromEntries(BIOMES.map(b => [b.id, b]))
const FALLBACK = BIOMES[0].id

// ── 상태 ─────────────────────────────────────────────────────────────────────
let mapData = null          // { id, name, size, start, tiles }
let selectedBiome = BIOMES[0].id
let zoom = 16               // px per tile
let isPainting = false
let cursorTile = null       // { x, y }
let undoStack = []          // array of serialized tile snapshots
let cursorSetForStart = null
let fileHandle = null       // FileSystemFileHandle (File System Access API)

// ── 기본 맵 ──────────────────────────────────────────────────────────────────
function makeDefaultMap() {
  const size = 33
  return {
    id: 'default-wastes',
    name: '폐허 외곽',
    size,
    start: { x: 16, y: 16 },
    dungeons: [],
    tiles: Array.from({ length: size }, () =>
      Array.from({ length: size }, () => ({ biome: FALLBACK }))
    )
  }
}

// ── 캔버스 ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('map-canvas')
const ctx = canvas.getContext('2d')

function resizeCanvas() {
  if (!mapData) return
  canvas.width  = mapData.size * zoom
  canvas.height = mapData.size * zoom
}

function render() {
  if (!mapData) return
  const { size, tiles, start } = mapData
  ctx.clearRect(0, 0, canvas.width, canvas.height)

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const tile = tiles[y]?.[x]
      const biomeId = tile?.biome ?? FALLBACK
      const biome = BIOME_MAP[biomeId] ?? BIOME_MAP[FALLBACK]
      ctx.fillStyle = biome.color
      ctx.fillRect(x * zoom, y * zoom, zoom, zoom)

      if (tile?.dungeonId && zoom >= 6) {
        const dungeon = mapData.dungeons?.find(d => d.id === tile.dungeonId)
        const emoji = dungeon?.emoji ?? '🏚️'
        ctx.font = `${Math.max(8, Math.floor(zoom * 0.6))}px serif`
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(emoji, x * zoom + zoom / 2, y * zoom + zoom / 2)
      }
    }
  }

  // 그리드 (zoom >= 6)
  if (zoom >= 6) {
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'
    ctx.lineWidth = 0.5
    for (let i = 0; i <= size; i++) {
      ctx.beginPath(); ctx.moveTo(i * zoom, 0); ctx.lineTo(i * zoom, size * zoom); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(0, i * zoom); ctx.lineTo(size * zoom, i * zoom); ctx.stroke()
    }
  }

  // 출발 지점
  const sx = start.x, sy = start.y
  ctx.fillStyle = 'rgba(255,255,100,0.9)'
  const m = Math.max(2, zoom * 0.3)
  ctx.fillRect(sx * zoom + zoom/2 - m/2, sy * zoom + zoom/2 - m/2, m, m)
  if (zoom >= 10) {
    ctx.fillStyle = '#000'
    ctx.font = `${Math.floor(zoom * 0.55)}px monospace`
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('🏠', sx * zoom + zoom / 2, sy * zoom + zoom / 2)
  }

  // 커서 하이라이트
  if (cursorTile) {
    ctx.strokeStyle = 'rgba(255,255,255,0.8)'
    ctx.lineWidth = Math.max(1, zoom * 0.07)
    ctx.strokeRect(cursorTile.x * zoom + 1, cursorTile.y * zoom + 1, zoom - 2, zoom - 2)
  }
}

// ── 페인트 ────────────────────────────────────────────────────────────────────
function tileFromEvent(e) {
  const rect = canvas.getBoundingClientRect()
  const x = Math.floor((e.clientX - rect.left) / zoom)
  const y = Math.floor((e.clientY - rect.top) / zoom)
  if (!mapData || x < 0 || y < 0 || x >= mapData.size || y >= mapData.size) return null
  return { x, y }
}

function pushUndo() {
  undoStack.push(mapData.tiles.map(row => row.map(t => ({ ...t }))))
  if (undoStack.length > 50) undoStack.shift()
}

function paintTile(tile) {
  if (!tile || !mapData) return
  const current = mapData.tiles[tile.y][tile.x]
  if (activePaintDungeonId !== null) {
    // dungeon paint: set dungeonId, keep biome
    mapData.tiles[tile.y][tile.x] = { biome: current?.biome ?? FALLBACK, dungeonId: activePaintDungeonId }
  } else {
    mapData.tiles[tile.y][tile.x] = { biome: selectedBiome }
  }
  render()
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault()
  const tile = tileFromEvent(e)
  if (!tile) return
  if (e.button === 2) {
    if (activePaintDungeonId !== null) {
      // 우클릭 = dungeonId 제거 (biome 유지)
      pushUndo()
      const current = mapData.tiles[tile.y]?.[tile.x]
      mapData.tiles[tile.y][tile.x] = { biome: current?.biome ?? FALLBACK }
      render()
    } else {
      // 우클릭 = 바이옴 선택
      const biomeId = mapData.tiles[tile.y]?.[tile.x]?.biome ?? FALLBACK
      setSelectedBiome(biomeId)
    }
    return
  }
  pushUndo()
  isPainting = true
  paintTile(tile)
})

canvas.addEventListener('mousemove', e => {
  const tile = tileFromEvent(e)
  cursorTile = tile
  cursorSetForStart = tile
  if (tile) {
    updateInfoBox(tile)
  }
  if (isPainting && tile) paintTile(tile)
  else render()
})

canvas.addEventListener('mouseup', () => { isPainting = false; scheduleAutoSave() })
canvas.addEventListener('mouseleave', () => { if (isPainting) scheduleAutoSave(); isPainting = false; cursorTile = null; render() })
canvas.addEventListener('contextmenu', e => e.preventDefault())

canvas.addEventListener('wheel', e => {
  e.preventDefault()
  setZoom(zoom + (e.deltaY < 0 ? 2 : -2))
}, { passive: false })

// ── 실행 취소 ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault()
    if (undoStack.length === 0) { setStatus('되돌릴 내용 없음'); return }
    mapData.tiles = undoStack.pop()
    render()
    setStatus(`실행 취소 (남은 스택: ${undoStack.length})`)
  }
})

// ── 줌 ───────────────────────────────────────────────────────────────────────
function setZoom(z) {
  zoom = Math.max(4, Math.min(40, z))
  document.getElementById('zoom-label').textContent = zoom + 'px'
  resizeCanvas()
  render()
}

// ── 바이옴 선택 ───────────────────────────────────────────────────────────────
function setSelectedBiome(id) {
  selectedBiome = id
  document.querySelectorAll('.biome-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.biome === id)
  })
}

// ── 출발 지점 ─────────────────────────────────────────────────────────────────
function onStartChange() {
  if (!mapData) return
  const x = parseInt(document.getElementById('start-x').value)
  const y = parseInt(document.getElementById('start-y').value)
  if (!Number.isFinite(x) || !Number.isFinite(y)) return
  mapData.start.x = Math.max(0, Math.min(mapData.size - 1, x))
  mapData.start.y = Math.max(0, Math.min(mapData.size - 1, y))
  render()
  scheduleAutoSave()
}

function setStartFromCursor() {
  if (!cursorSetForStart || !mapData) { setStatus('커서를 맵 위로 이동하세요'); return }
  mapData.start.x = cursorSetForStart.x
  mapData.start.y = cursorSetForStart.y
  document.getElementById('start-x').value = mapData.start.x
  document.getElementById('start-y').value = mapData.start.y
  render()
  setStatus(`출발 지점 → (${mapData.start.x}, ${mapData.start.y})`)
  scheduleAutoSave()
}

function syncStartInputs() {
  document.getElementById('start-x').value = mapData.start.x
  document.getElementById('start-y').value = mapData.start.y
}

// ── 정보 박스 ─────────────────────────────────────────────────────────────────
function updateInfoBox(tile) {
  const t = mapData?.tiles[tile.y]?.[tile.x]
  const biomeId = t?.biome ?? FALLBACK
  const biome = BIOME_MAP[biomeId]
  const dungeonLine = t?.dungeonId ? `<br><strong>던전</strong> ${t.dungeonId}` : ''
  document.getElementById('info-box').innerHTML =
    `<strong>위치</strong> (${tile.x}, ${tile.y})<br>` +
    `<strong>바이옴</strong> ${biome.emoji} ${biome.name}<br>` +
    `<strong>ID</strong> ${biomeId}${dungeonLine}`
}

// ── 상태바 ────────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg
}

// ── 파일 불러오기 / 저장 ──────────────────────────────────────────────────────
async function loadFile() {
  // File System Access API 지원 시 파일 핸들 획득
  if (window.showOpenFilePicker) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
      })
      fileHandle = handle
      const file = await handle.getFile()
      const text = await file.text()
      loadMapData(JSON.parse(text))
      setStatus(`불러옴: ${file.name} (저장 시 같은 파일에 덮어씁니다)`)
      document.getElementById('save-btn').textContent = `💾 ${file.name} 에 저장`
      return
    } catch(e) {
      if (e.name === 'AbortError') return
    }
  }
  // 폴백: 일반 input
  document.getElementById('file-input').click()
}

function onFileSelected(e) {
  const file = e.target.files[0]
  if (!file) return
  fileHandle = null
  const reader = new FileReader()
  reader.onload = ev => {
    try {
      loadMapData(JSON.parse(ev.target.result))
      setStatus(`불러옴: ${file.name}`)
    } catch(err) {
      alert('JSON 파싱 오류: ' + err.message)
    }
  }
  reader.readAsText(file)
  e.target.value = ''
}

function loadMapData(raw) {
  const size = Math.max(8, Number(raw.size) || 33)
  const dungeons = Array.isArray(raw.dungeons) ? raw.dungeons.filter(d => d && typeof d.id === 'string') : []
  const dungeonIds = new Set(dungeons.map(d => d.id))
  const tiles = Array.from({ length: size }, (_, y) =>
    Array.from({ length: size }, (_, x) => {
      const rawTile = raw.tiles?.[y]?.[x]
      const b = rawTile?.biome
      const biome = (typeof b === 'string' && BIOME_MAP[b]) ? b : FALLBACK
      const dungeonId = typeof rawTile?.dungeonId === 'string' && dungeonIds.has(rawTile.dungeonId) ? rawTile.dungeonId : undefined
      return dungeonId ? { biome, dungeonId } : { biome }
    })
  )
  mapData = {
    id: raw.id ?? 'default-wastes',
    name: raw.name ?? '탐험 지역',
    size,
    start: {
      x: Math.max(0, Math.min(size - 1, Number(raw.start?.x) || Math.floor(size / 2))),
      y: Math.max(0, Math.min(size - 1, Number(raw.start?.y) || Math.floor(size / 2))),
    },
    dungeons,
    tiles,
  }
  undoStack = []
  resizeCanvas()
  syncStartInputs()
  renderDungeonPanel()
  renderDungeonPalette()
  render()
}

function toJson() {
  if (!mapData) return ''
  // tiles를 간결하게: 각 행을 한 줄로
  const tilesJson = '[\n' + mapData.tiles.map(row =>
    '    [' + row.map(t => {
      if (t.dungeonId) return `{"biome":"${t.biome}","dungeonId":"${t.dungeonId}"}`
      return `{"biome":"${t.biome}"}`
    }).join(',') + ']'
  ).join(',\n') + '\n  ]'

  return JSON.stringify({
    id: mapData.id,
    name: mapData.name,
    size: mapData.size,
    start: mapData.start,
    dungeons: mapData.dungeons ?? [],
    tiles: '__TILES__'
  }, null, 2).replace('"__TILES__"', tilesJson)
}

async function saveJson() {
  if (!mapData) return
  const json = toJson()

  // 파일 핸들이 있으면 바로 덮어쓰기
  if (fileHandle) {
    try {
      const writable = await fileHandle.createWritable()
      await writable.write(json)
      await writable.close()
      setStatus(`✅ 저장 완료: ${fileHandle.name}`)
      return
    } catch(e) {
      setStatus(`저장 실패: ${e.message}`)
      return
    }
  }

  // 핸들 없으면 다운로드
  const blob = new Blob([json], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'default-map.json'
  a.click()
  setStatus('다운로드 완료: default-map.json')
}

// ── GitHub 저장 ───────────────────────────────────────────────────────────────
const GH_REPO  = 'nayouta47/morning'
const GH_PATH  = 'src/data/maps/default-map.json'
const GH_BRANCH = 'main'

function getToken() { return localStorage.getItem('gh_token') ?? '' }
function setToken(t) { localStorage.setItem('gh_token', t) }

function showTokenDialog() {
  const current = getToken()
  const t = prompt('GitHub Personal Access Token\n(repo > contents:write 권한 필요)\n저장되면 localStorage에 보관됩니다.', current)
  if (t === null) return
  setToken(t.trim())
  setStatus(t.trim() ? '토큰 저장됨' : '토큰 삭제됨')
}

// ── 자동저장 ──────────────────────────────────────────────────────────────────
let autoSaveTimer = null
let isSaving = false

function scheduleAutoSave() {
  if (!getToken()) return
  clearTimeout(autoSaveTimer)
  autoSaveTimer = setTimeout(githubSave, 2000)
  setStatus('✏️ 변경됨 — 2초 후 자동 저장...')
}

async function githubSave() {
  if (!mapData) return
  const token = getToken()
  if (!token) {
    showTokenDialog()
    if (!getToken()) return
  }
  if (isSaving) return

  isSaving = true
  setStatus('⏳ GitHub에 저장 중...')

  try {
    const headers = {
      'Authorization': `Bearer ${getToken()}`,
      'Accept': 'application/vnd.github+json',
    }

    // 현재 파일 SHA 조회
    const metaRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`, { headers })
    if (!metaRes.ok) throw new Error(`파일 조회 실패: ${metaRes.status} ${await metaRes.text()}`)
    const meta = await metaRes.json()
    const sha = meta.sha

    // Base64 인코딩
    const json = toJson()
    const encoded = btoa(unescape(encodeURIComponent(json)))

    // 커밋
    const putRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_PATH}`, {
      method: 'PUT',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'map: update exploration map via editor',
        content: encoded,
        sha,
        branch: GH_BRANCH,
      }),
    })
    if (!putRes.ok) throw new Error(`커밋 실패: ${putRes.status} ${await putRes.text()}`)

    setStatus('✅ 자동 저장 완료')
  } catch(e) {
    setStatus(`❌ 저장 실패: ${e.message}`)
    console.error(e)
  } finally {
    isSaving = false
  }
}

// ── 팔레트 탭 전환 ────────────────────────────────────────────────────────────
let activePaletteTab = 'biome'
let activePaintDungeonId = null   // null = biome mode, string = dungeon paint mode

function switchPaletteTab(tab) {
  activePaletteTab = tab
  document.getElementById('tab-biome').classList.toggle('active', tab === 'biome')
  document.getElementById('tab-dungeon').classList.toggle('active', tab === 'dungeon')
  document.getElementById('dungeon-panel').classList.toggle('visible', tab === 'dungeon')
  document.getElementById('main').style.display = tab === 'biome' ? '' : 'none'
}

// ── 던전 데이터 ───────────────────────────────────────────────────────────────
// mapData.dungeons는 DungeonDef 배열

function getDungeons() {
  return mapData?.dungeons ?? []
}

function setActivePaintDungeon(id) {
  activePaintDungeonId = id
  document.querySelectorAll('.dungeon-palette-btn').forEach(btn => {
    btn.classList.toggle('paint-active', btn.dataset.dungeonId === id)
  })
  document.querySelectorAll('.btn-paint').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.dungeonId === id)
  })
  setStatus(id ? `던전 페인트 모드: ${id}` : '던전 페인트 해제')
}

function renderDungeonPanel() {
  const panel = document.getElementById('dungeon-panel')
  const dungeons = getDungeons()
  let html = '<div class="dungeon-list">'
  if (dungeons.length === 0) {
    html += '<div style="font-size:12px;color:#666">던전 없음</div>'
  }
  dungeons.forEach(d => {
    html += `<div class="dungeon-list-item" data-id="${d.id}">
      <div class="dungeon-item-header" onclick="openDungeonForm('${d.id}')">
        <span>${d.emoji} <strong>${d.name}</strong> (${d.floors.length}층, id: ${d.id})</span>
        <button class="btn-delete" onclick="deleteDungeon('${d.id}'); event.stopPropagation()">삭제</button>
      </div>
      <div class="dungeon-item-form"></div>
    </div>`
  })
  html += '</div>'

  // 새 던전 추가 버튼
  html += '<button class="action-btn" onclick="openDungeonForm(null)" style="align-self:flex-start">+ 새 던전 추가</button>'
  html += '<div id="dungeon-form-new"></div>'

  panel.innerHTML = html
}

function renderDungeonPalette() {
  const palette = document.getElementById('dungeon-palette')
  palette.innerHTML = ''
  const dungeons = getDungeons()
  dungeons.forEach(d => {
    const btn = document.createElement('button')
    btn.className = 'dungeon-btn dungeon-palette-btn' + (activePaintDungeonId === d.id ? ' paint-active' : '')
    btn.dataset.dungeonId = d.id
    btn.textContent = `${d.emoji} ${d.name}`
    btn.addEventListener('click', () => setActivePaintDungeon(activePaintDungeonId === d.id ? null : d.id))
    palette.appendChild(btn)
  })
  if (dungeons.length === 0) {
    palette.innerHTML = '<span style="font-size:12px;color:#666">던전 없음</span>'
  }
}

const ENEMY_OPTIONS = [
  { id: 'siliconLifeform', name: '벌벌떠는 기인' },
  { id: 'siliconBug', name: '규소충' },
  { id: 'wheelBug', name: '바퀴 벌레' },
  { id: 'bareBonesMan', name: '앙상한 사내' },
  { id: 'rustGolem', name: '녹슨 골렘' },
  { id: 'staticHound', name: '정전기 개' },
  { id: 'moldedWorker', name: '곰팡이 노동자' },
  { id: 'chromiumCrawler', name: '크롬 집게발' },
]

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = el.scrollHeight + 'px'
}

function buildDungeonFormHTML(editId) {
  const existing = editId ? getDungeons().find(d => d.id === editId) : null
  const floorCount = existing ? existing.floors.length : 3

  let floorsHtml = ''
  for (let i = 0; i < floorCount; i++) {
    const f = existing?.floors[i]
    const enemyOptions = ENEMY_OPTIONS.map(e =>
      `<option value="${e.id}"${(f?.enemyId ?? ENEMY_OPTIONS[0].id) === e.id ? ' selected' : ''}>${e.name}</option>`
    ).join('')
    floorsHtml += `<div class="floor-block">
      <h4>${i + 1}층</h4>
      <div class="form-row">
        <label>적<select name="floor_enemy_${i}">${enemyOptions}</select></label>
        <label>보상 배율<input type="number" name="floor_mult_${i}" value="${f?.rewardMultiplier ?? 1}" min="0.5" max="3" step="0.5" style="width:70px"></label>
      </div>
      <div class="form-row">
        <label style="flex:1">진입 텍스트<textarea name="floor_dialog_${i}" rows="2" oninput="autoResize(this)">${f?.dialogText ?? ''}</textarea></label>
      </div>
    </div>`
  }

  return `<div id="dungeon-form-wrap">
    <h3>${editId ? '던전 편집' : '새 던전'}</h3>
    <div class="form-row">
      <label>ID<input type="text" id="df-id" value="${existing?.id ?? ''}" placeholder="dungeon-1" ${editId ? 'readonly' : ''}></label>
      <label>이름<input type="text" id="df-name" value="${existing?.name ?? ''}" placeholder="버려진 공장"></label>
      <label>이모지<input type="text" id="df-emoji" value="${existing?.emoji ?? '🏚️'}" style="width:60px"></label>
    </div>
    <div class="form-row">
      <label style="flex:1">진입 텍스트<textarea id="df-entry" rows="2" oninput="autoResize(this)">${existing?.entryText ?? ''}</textarea></label>
    </div>
    <div class="form-row">
      <label>층 수<select id="df-floors" onchange="updateFloorCount(this.value, ${editId ? `'${editId}'` : 'null'})">
        ${[3,4,5].map(n => `<option value="${n}"${n === floorCount ? ' selected' : ''}>${n}층</option>`).join('')}
      </select></label>
    </div>
    <div id="df-floors-container">${floorsHtml}</div>
    ${editId ? '' : '<div class="form-actions"><button class="action-btn" onclick="saveDungeonForm(\'\')">추가</button></div>'}
  </div>`
}

function openDungeonForm(editId) {
  // 기존에 열려있는 폼 모두 닫기
  document.querySelectorAll('.dungeon-item-form.open').forEach(el => {
    el.classList.remove('open')
    el.innerHTML = ''
  })
  const newFormContainer = document.getElementById('dungeon-form-new')
  if (newFormContainer) newFormContainer.innerHTML = ''

  if (!editId) {
    // 새 던전: 목록 하단 고정 영역에 렌더
    const container = document.getElementById('dungeon-form-new')
    if (container) {
      container.innerHTML = buildDungeonFormHTML(null)
      document.querySelectorAll('.form-row textarea').forEach(autoResize)
    }
    return
  }

  // 편집: 해당 아이템의 .dungeon-item-form 찾아 open
  const item = document.querySelector(`.dungeon-list-item[data-id="${editId}"]`)
  if (!item) return
  const formDiv = item.querySelector('.dungeon-item-form')
  if (formDiv.classList.contains('open')) {
    formDiv.classList.remove('open')
    formDiv.innerHTML = ''
    return
  }
  formDiv.innerHTML = buildDungeonFormHTML(editId)
  formDiv.classList.add('open')
  document.querySelectorAll('.form-row textarea').forEach(autoResize)
  formDiv.addEventListener('input', () => scheduleDungeonAutoSave(editId))
  formDiv.addEventListener('change', () => scheduleDungeonAutoSave(editId))
}

function updateFloorCount(count, editId) {
  const existing = editId ? getDungeons().find(d => d.id === editId) : null
  const n = parseInt(count)
  const container = document.getElementById('df-floors-container')
  let floorsHtml = ''
  for (let i = 0; i < n; i++) {
    const f = existing?.floors[i]
    const enemyOptions = ENEMY_OPTIONS.map(e =>
      `<option value="${e.id}"${(f?.enemyId ?? ENEMY_OPTIONS[0].id) === e.id ? ' selected' : ''}>${e.name}</option>`
    ).join('')
    floorsHtml += `<div class="floor-block">
      <h4>${i + 1}층</h4>
      <div class="form-row">
        <label>적<select name="floor_enemy_${i}">${enemyOptions}</select></label>
        <label>보상 배율<input type="number" name="floor_mult_${i}" value="${f?.rewardMultiplier ?? 1}" min="0.5" max="3" step="0.5" style="width:70px"></label>
      </div>
      <div class="form-row">
        <label style="flex:1">진입 텍스트<textarea name="floor_dialog_${i}" rows="2" oninput="autoResize(this)">${f?.dialogText ?? ''}</textarea></label>
      </div>
    </div>`
  }
  container.innerHTML = floorsHtml
  document.querySelectorAll('.form-row textarea').forEach(autoResize)
}

function saveDungeonForm(editId) {
  const id = editId || document.getElementById('df-id').value.trim()
  const name = document.getElementById('df-name').value.trim()
  const emoji = document.getElementById('df-emoji').value.trim() || '🏚️'
  const entryText = document.getElementById('df-entry').value.trim()
  const floorCount = parseInt(document.getElementById('df-floors').value)

  if (!id) { alert('ID를 입력하세요'); return }
  if (!name) { alert('이름을 입력하세요'); return }

  if (!mapData.dungeons) mapData.dungeons = []

  // Check duplicate id for new
  if (!editId && mapData.dungeons.find(d => d.id === id)) {
    alert(`ID "${id}"가 이미 존재합니다`)
    return
  }

  const floors = []
  for (let i = 0; i < floorCount; i++) {
    const enemy = document.querySelector(`[name="floor_enemy_${i}"]`)?.value ?? ENEMY_OPTIONS[0].id
    const mult = parseFloat(document.querySelector(`[name="floor_mult_${i}"]`)?.value ?? '1') || 1
    const dialog = document.querySelector(`[name="floor_dialog_${i}"]`)?.value ?? ''
    floors.push({ dialogText: dialog, enemyId: enemy, rewardMultiplier: mult })
  }

  const dungeon = { id, name, emoji, entryText, floors }

  if (editId) {
    const idx = mapData.dungeons.findIndex(d => d.id === editId)
    if (idx >= 0) mapData.dungeons[idx] = dungeon
    else mapData.dungeons.push(dungeon)
  } else {
    mapData.dungeons.push(dungeon)
  }

  closeDungeonForm()
  renderDungeonPanel()
  renderDungeonPalette()
  scheduleAutoSave()
  setStatus(`던전 "${name}" 저장됨`)
}

function closeDungeonForm() {
  document.querySelectorAll('.dungeon-item-form.open').forEach(el => {
    el.classList.remove('open')
    el.innerHTML = ''
  })
  const newForm = document.getElementById('dungeon-form-new')
  if (newForm) newForm.innerHTML = ''
}

let _dungeonAutoSaveTimer = null
function scheduleDungeonAutoSave(editId) {
  clearTimeout(_dungeonAutoSaveTimer)
  _dungeonAutoSaveTimer = setTimeout(() => doAutoSaveDungeon(editId), 600)
}

function doAutoSaveDungeon(editId) {
  const name = document.getElementById('df-name')?.value.trim()
  if (!name) return
  const emoji = document.getElementById('df-emoji')?.value.trim() || '🏚️'
  const entryText = document.getElementById('df-entry')?.value.trim() ?? ''
  const floorCount = parseInt(document.getElementById('df-floors')?.value ?? '3')
  if (!mapData.dungeons) mapData.dungeons = []
  const floors = []
  for (let i = 0; i < floorCount; i++) {
    const enemy = document.querySelector(`[name="floor_enemy_${i}"]`)?.value ?? ENEMY_OPTIONS[0].id
    const mult = parseFloat(document.querySelector(`[name="floor_mult_${i}"]`)?.value ?? '1') || 1
    const dialog = document.querySelector(`[name="floor_dialog_${i}"]`)?.value ?? ''
    floors.push({ dialogText: dialog, enemyId: enemy, rewardMultiplier: mult })
  }
  const dungeon = { id: editId, name, emoji, entryText, floors }
  const idx = mapData.dungeons.findIndex(d => d.id === editId)
  if (idx >= 0) mapData.dungeons[idx] = dungeon
  // Update header text in-place (don't re-render panel — would destroy the open form)
  const item = document.querySelector(`.dungeon-list-item[data-id="${editId}"]`)
  if (item) {
    const span = item.querySelector('.dungeon-item-header span')
    if (span) span.innerHTML = `${emoji} <strong>${name}</strong> (${floors.length}층, id: ${editId})`
  }
  renderDungeonPalette()
  scheduleAutoSave()
  setStatus(`✏️ "${name}" 자동 저장됨`)
}

function deleteDungeon(id) {
  if (!confirm(`던전 "${id}"를 삭제할까요? 타일에 배치된 dungeonId도 제거됩니다.`)) return
  mapData.dungeons = mapData.dungeons.filter(d => d.id !== id)
  // Remove dungeonId from tiles
  mapData.tiles.forEach(row => row.forEach(t => { if (t.dungeonId === id) delete t.dungeonId }))
  if (activePaintDungeonId === id) activePaintDungeonId = null
  renderDungeonPanel()
  renderDungeonPalette()
  render()
  scheduleAutoSave()
  setStatus(`던전 "${id}" 삭제됨`)
}

// GitHub API에서 맵 자동 로드, 실패 시 로컬 → 기본 맵 순으로 폴백
async function autoLoad() {
  const token = getToken()
  const headers = { 'Accept': 'application/vnd.github+json' }
  if (token) headers['Authorization'] = `Bearer ${token}`

  try {
    setStatus('⏳ GitHub에서 맵 로드 중...')
    const res = await fetch(
      `https://api.github.com/repos/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`,
      { headers }
    )
    if (!res.ok) throw new Error(`${res.status}`)
    const meta = await res.json()
    const json = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))))
    loadMapData(JSON.parse(json))
    setStatus('✅ GitHub에서 맵 자동 로드 완료')
    return
  } catch(e) {
    console.warn('GitHub 로드 실패:', e.message)
  }

  // 로컬 서버 폴백
  try {
    const r = await fetch('../src/data/maps/default-map.json')
    if (r.ok) {
      loadMapData(await r.json())
      setStatus('default-map.json 자동 로드 완료 (로컬)')
      return
    }
  } catch(_) {}

  loadMapData(makeDefaultMap())
  setStatus('기본 맵 생성됨 — GitHub 토큰(🔑)을 설정하면 자동 로드됩니다')
}
